<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tiny Empire</title>
    <link rel="stylesheet" href="assets/styles.css?v=66" />
  </head>
  <body>
    <!-- Auth overlay -->
    <div id="auth-overlay">
      <div class="auth-box">
        <h1>Tiny Empire</h1>
        <p class="auth-subtitle">Ant Colony Survival</p>
        <div id="auth-form">
          <input id="auth-login" type="text" placeholder="Login name" autocomplete="username" />
          <input id="auth-visible" type="text" placeholder="Display name (register only)" />
          <input id="auth-pass" type="password" placeholder="Password" autocomplete="current-password" />
          <div class="auth-buttons">
            <button id="btn-login" type="button">Login</button>
            <button id="btn-register" type="button">Register</button>
          </div>
          <p id="auth-error" class="error"></p>
        </div>
      </div>
    </div>

    <!-- HUD -->
    <div id="hud" style="display:none">
      <div id="hud-stats">
        <span id="hud-food">Food: 0</span>
        <span id="hud-sugar">Sugar: 0</span>
        <span id="hud-pop">Ants: 0</span>
        <span id="hud-tick">Tick: 0</span>
      </div>
      <div id="hud-save-status">--</div>
      <div id="hud-controls">
        <div id="hud-connection" class="status-offline">offline</div>
        <button id="store-btn" type="button" aria-label="Open store" title="Store">🛒</button>
        <button id="settings-btn" type="button" aria-label="Open settings" title="Settings">⚙</button>
      </div>
    </div>

    <div id="settings-backdrop" class="hidden" aria-hidden="true"></div>

    <div id="settings-menu" class="menu-panel hidden" aria-hidden="true">
      <button id="menu-resume" type="button" title="Close settings and resume the game">Resume Game</button>
      <button id="menu-save" type="button" title="Save your current game progress to the server">Save</button>
      <button id="menu-load" type="button" title="Load the most recent save from the server">Load</button>
      <button id="menu-return-ants" type="button" title="Command all ants to return to the nest immediately">Return All Ants To Nest</button>
      <button id="menu-reset-heatmap" type="button" title="Clear all road traffic heatmap marks from the map">Reset Heatmap</button>
      <button id="menu-delete-resources" type="button" title="Despawn all resources on the map and clear the gathering zone">Delete All Resources</button>
      <button id="menu-open-store" type="button" title="Open the Store to buy upgrades">Store</button>
      <button id="menu-logout" type="button" title="Log out and return to the login screen">Log Out</button>
    </div>

    <!-- Game canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Modules loaded as classic scripts (no build step) -->
    <script src="js/rng.js?v=66"></script>
    <script src="js/state.js?v=66"></script>
    <script src="js/game.js?v=66"></script>
    <script src="js/renderer.js?v=66"></script>
    <script src="js/input.js?v=66"></script>
    <script src="js/ui.js?v=66"></script>
    <script src="js/net.js?v=66"></script>
    <script src="js/boot.js?v=66"></script>
  </body>
</html>
